<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>摸鱼助手</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header class="app-header">
      <div class="brand">
        <span class="brand-emoji" aria-hidden="true">☕️</span>
        <div class="brand-text">
          <h1>摸鱼助手</h1>
          <p>自动滚动 · 防屏保</p>
        </div>
      </div>
      <label class="switch" title="总开关">
        <input type="checkbox" id="enabled" />
        <span class="slider"></span>
      </label>
    </header>

    <p class="status" id="status">已停止</p>

    <section class="card">
      <div class="row">
        <label for="speed">滚动速度</label>
        <span class="value" id="speedValue">2 px</span>
      </div>
      <input type="range" id="speed" min="1" max="12" step="1" />

      <div class="row">
        <label for="tickMs">平滑度（间隔越小越顺滑）</label>
        <span class="value" id="tickValue">24 ms</span>
      </div>
      <input type="range" id="tickMs" min="8" max="80" step="2" />

      <div class="row">
        <label for="mode">到底部时</label>
        <select id="mode">
          <option value="bounce">来回滚动（推荐）</option>
          <option value="loop">回到顶部循环</option>
        </select>
      </div>
    </section>

    <section class="card">
      <div class="row">
        <label for="pauseChance">停顿概率（模拟阅读）</label>
        <span class="value" id="pauseValue">35%</span>
      </div>
      <input type="range" id="pauseChance" min="0" max="100" step="5" />

      <div class="row split">
        <div>
          <label for="pauseMinMs">停顿最短</label>
          <span class="value" id="pauseMinValue">1.5 s</span>
        </div>
        <div>
          <label for="pauseMaxMs">停顿最长</label>
          <span class="value" id="pauseMaxValue">5.0 s</span>
        </div>
      </div>
      <input type="range" id="pauseMinMs" min="0" max="10000" step="500" />
      <input type="range" id="pauseMaxMs" min="500" max="20000" step="500" />
    </section>

    <section class="card">
      <div class="row">
        <label for="takeoverMode">真人接管</label>
        <select id="takeoverMode">
          <option value="off">关闭</option>
          <option value="instant">动一下就暂停</option>
          <option value="delayed">持续操作超过 N 秒才暂停</option>
        </select>
      </div>

      <div class="row" id="delayRow">
        <label for="takeoverDelayMs">接管阈值（持续操作）</label>
        <span class="value" id="delayValue">3.0 s</span>
      </div>
      <input type="range" id="takeoverDelayMs" min="1000" max="10000" step="500" />

      <label class="toggle-row">
        <span>离开后自动恢复</span>
        <span class="mini-switch">
          <input type="checkbox" id="autoResume" />
          <span class="mini-slider"></span>
        </span>
      </label>

      <div class="row" id="resumeRow">
        <label for="resumeIdleMs">恢复等待（无操作）</label>
        <span class="value" id="resumeValue">6.0 s</span>
      </div>
      <input type="range" id="resumeIdleMs" min="2000" max="30000" step="1000" />
    </section>

    <section class="card toggles">
      <label class="toggle-row">
        <span>拟人化抖动</span>
        <span class="mini-switch">
          <input type="checkbox" id="humanize" />
          <span class="mini-slider"></span>
        </span>
      </label>
      <label class="toggle-row" title="申请 Screen Wake Lock，避免息屏/屏保盖住滚动画面">
        <span>保持屏幕常亮（辅助）</span>
        <span class="mini-switch">
          <input type="checkbox" id="wakeLock" />
          <span class="mini-slider"></span>
        </span>
      </label>
      <label class="toggle-row" title="在网页控制台打印诊断日志，便于排查不生效的页面">
        <span>调试日志（控制台）</span>
        <span class="mini-switch">
          <input type="checkbox" id="debug" />
          <span class="mini-slider"></span>
        </span>
      </label>
    </section>

    <section class="card diag">
      <div class="diag-head">
        <span>当前页面诊断</span>
        <button id="refreshDiag" class="link-btn" type="button">刷新</button>
      </div>
      <div id="diagBody" class="diag-body">检测中…</div>
    </section>

    <p class="note">
      仅让<strong>屏幕画面</strong>看起来有人在浏览（适合屏幕共享/旁人偷瞄）。
      无法移动真实鼠标，也骗不过系统级监控。摸鱼标签页需保持前台可见。
    </p>

    <footer class="app-footer">
      <button id="reset" class="link-btn" type="button">恢复默认</button>
      <span class="hint">设置实时生效</span>
    </footer>

    <script src="defaults.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
